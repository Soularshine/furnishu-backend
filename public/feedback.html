<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FurnishU — Feedback</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f9e0;color:#1c1c1c;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .card{background:#fff;border-radius:16px;padding:36px 32px;max-width:500px;width:100%;box-shadow:0 4px 24px rgba(61,28,2,.10)}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
    .logo-icon{width:38px;height:38px;background:#69b259;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#69b259;font-size:20px}
    .logo-text{font-size:20px;font-weight:700;color:#69b259}
    h1{font-size:22px;font-weight:700;color:#69b259;margin-bottom:6px}
    p.sub{color:#6b7280;font-size:14px;margin-bottom:28px}
    label{display:block;font-size:14px;font-weight:600;color:#69b259;margin-bottom:6px;margin-top:20px}
    label:first-of-type{margin-top:0}
    textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;resize:vertical;min-height:80px;outline:none;transition:border .15s}
    textarea:focus{border-color:#69b259}
    .stars{display:flex;gap:8px;margin-top:4px}
    .star{font-size:28px;cursor:pointer;color:#d1d5db;transition:color .1s;line-height:1}
    .star.on{color:#69b259}
    .btn{display:block;width:100%;margin-top:28px;padding:13px;background:#69b259;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
    .btn:hover{background:#6b3132}
    .btn:disabled{background:#9ca3af;cursor:not-allowed}
    .success{text-align:center;display:none}
    .success .check{font-size:48px;margin-bottom:12px}
    .success h2{font-size:20px;font-weight:700;color:#e084a5;margin-bottom:8px}
    .success p{color:#6b7280;font-size:14px}
    a.back{display:inline-block;margin-top:20px;font-size:13px;color:#69b259;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">&#x1F6CB;</div>
      <span class="logo-text">FurnishU</span>
    </div>

    <div id="form-view">
      <h1>Share your feedback</h1>
      <p class="sub">Takes 60 seconds. Helps us make this better for every student.</p>

      <label>Overall, how was your experience?</label>
      <div class="stars" id="stars">
        <span class="star" data-v="1">&#9733;</span>
        <span class="star" data-v="2">&#9733;</span>
        <span class="star" data-v="3">&#9733;</span>
        <span class="star" data-v="4">&#9733;</span>
        <span class="star" data-v="5">&#9733;</span>
      </div>

      <label for="worked">What worked well?</label>
      <textarea id="worked" placeholder="e.g. Easy to sign in, found exactly what I needed..."></textarea>

      <label for="broken">What didn't work or felt confusing?</label>
      <textarea id="broken" placeholder="e.g. Couldn't upload a photo, wasn't sure how to claim..."></textarea>

      <label for="name">Your name (optional)</label>
      <textarea id="name" style="min-height:42px;resize:none" placeholder="e.g. Jordan S."></textarea>

      <button class="btn" id="submit-btn" onclick="submitFeedback()">Send Feedback</button>
    </div>

    <div class="success" id="success-view">
      <div class="check">&#10003;</div>
      <h2>Thank you!</h2>
      <p>Your feedback was sent to the FurnishU team. We'll use it to keep improving.</p>
      <a class="back" href="/app">&#8592; Back to FurnishU</a>
    </div>
  </div>

  <script>
    let rating = 0;
    const stars = document.querySelectorAll('.star');
    stars.forEach(s => {
      s.addEventListener('mouseover', () => highlightStars(+s.dataset.v));
      s.addEventListener('mouseout',  () => highlightStars(rating));
      s.addEventListener('click',     () => { rating = +s.dataset.v; highlightStars(rating); });
    });
    function highlightStars(n) {
      stars.forEach(s => s.classList.toggle('on', +s.dataset.v <= n));
    }

    async function submitFeedback() {
      const btn = document.getElementById('submit-btn');
      const worked = document.getElementById('worked').value.trim();
      const broken = document.getElementById('broken').value.trim();
      const name   = document.getElementById('name').value.trim();
      if (!rating && !worked && !broken) {
        alert('Please fill in at least one field before submitting.');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        const resp = await fetch('/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rating, worked, broken, name })
        });
        if (resp.ok) {
          document.getElementById('form-view').style.display = 'none';
          document.getElementById('success-view').style.display = 'block';
        } else {
          btn.disabled = false;
          btn.textContent = 'Send Feedback';
          alert('Something went wrong. Please try again.');
        }
      } catch(e) {
        btn.disabled = false;
        btn.textContent = 'Send Feedback';
        alert('Could not send feedback. Check your connection.');
      }
    }
  </script>
</body>
</html>
